<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Dashboard - ESP32 Emergency System</title>
    <link rel="stylesheet" href="hospitalDashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-left">
                <h1>🏥 <span id="hospital-name">HOSPITAL</span></h1>
                <p class="header-subtitle">Emergency Response Dashboard</p>
            </div>
            <div class="header-right">
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span id="connection-status">Connecting...</span>
                </div>
                <div class="current-time" id="current-time"></div>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-icon">🚨</div>
                <div class="stat-content">
                    <div class="stat-value" id="stats-active">0</div>
                    <div class="stat-label">Active Alerts</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-content">
                    <div class="stat-value" id="stats-total">0</div>
                    <div class="stat-label">Total Alerts</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-content">
                    <div class="stat-value" id="stats-today">0</div>
                    <div class="stat-label">Today</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏱️</div>
                <div class="stat-content">
                    <div class="stat-value">~8min</div>
                    <div class="stat-label">Avg Response</div>
                </div>
            </div>
        </div>

        <div class="alerts-section">
            <div class="section-header">
                <h2>Emergency Alerts</h2>
                <button class="btn-refresh" onclick="location.reload()">🔄 Refresh</button>
            </div>
            <div id="alerts-container" class="alerts-container">
                <div class="no-alerts">
                    <div class="no-alerts-icon">✓</div>
                    <h3>No Active Emergencies</h3>
                    <p>System is monitoring. All clear.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // Set hospital name from URL or default
        const urlParams = new URLSearchParams(window.location.search);
        const hospitalNum = urlParams.get('id') || '1';
        window.HOSPITAL_ID = 'hospital' + hospitalNum;
        window.HOSPITAL_NAME = 'Hospital ' + hospitalNum;
        document.getElementById('hospital-name').textContent = window.HOSPITAL_NAME.toUpperCase();
        document.title = window.HOSPITAL_NAME + ' Dashboard';
        
        // Update time
        setInterval(() => {
            document.getElementById('current-time').textContent = new Date().toLocaleTimeString();
        }, 1000);
    </script>
    <script src="hospitalDashboard.js"></script>
</body>
</html>
